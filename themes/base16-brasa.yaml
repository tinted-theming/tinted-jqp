    cm: "noinherit italic #7a6150" # CommentMultiline
    cx: "noinherit italic #7a6150" # CommentSpecial
    ch: "noinherit italic #7a6150" # CommentHashbang
    cp: "noinherit italic #7a6150" # CommentPreproc
