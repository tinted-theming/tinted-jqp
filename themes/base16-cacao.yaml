    kt: "noinherit #e0705c" # KeywordType
    n: "noinherit #e8d6c4" # Name
    nc: "noinherit #e8a84a" # NameClass
    no: "noinherit #e8a84a" # NameConstant
    ne: "noinherit #c77b4a" # NameException
    nf: "noinherit #4e382a" # NameFunction
    nl: "noinherit #74c8b0" # NameLabel
    nn: "noinherit #c77b4a" # NameNamespace
    py: "noinherit #c77b4a" # NameProperty
    nt: "noinherit #e0705c" # NameTag
    nv: "noinherit #eedecd" # NameVariable
    vc: "noinherit #eedecd" # NameVariableClass
    vg: "noinherit #eedecd" # NameVariableGlobal
    vi: "noinherit #eedecd" # NameVariableInstance
    na: "noinherit #4e382a" # NameAttribute
    nb: "noinherit #74c8b0" # NameBuiltin
    nx: "noinherit #e8d6c4" # NameOther
    l: "noinherit #e8d6c4" # Literal
