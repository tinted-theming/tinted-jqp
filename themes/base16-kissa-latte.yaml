    kr: "noinherit #6438a0" # KeywordReserved
    kd: "noinherit #9e3e3e" # KeywordDeclaration
    kn: "noinherit #287070" # KeywordNamespace
    kt: "noinherit #9e3e3e" # KeywordType
    n: "noinherit #1f1c16" # Name
    nc: "noinherit #7d6820" # NameClass
    no: "noinherit #7d6820" # NameConstant
    ne: "noinherit #8f5d22" # NameException
    nf: "noinherit #943a68" # NameFunction
    nl: "noinherit #287070" # NameLabel
    nn: "noinherit #8f5d22" # NameNamespace
    py: "noinherit #8f5d22" # NameProperty
    nt: "noinherit #9e3e3e" # NameTag
    nv: "noinherit #6e6459" # NameVariable
    vc: "noinherit #6e6459" # NameVariableClass
    vg: "noinherit #6e6459" # NameVariableGlobal
    vi: "noinherit #6e6459" # NameVariableInstance
    na: "noinherit #943a68" # NameAttribute
    nb: "noinherit #287070" # NameBuiltin
    nx: "noinherit #1f1c16" # NameOther
    l: "noinherit #1f1c16" # Literal
    s: "noinherit #387050" # LiteralString
    sc: "noinherit #387050" # LiteralStringChar
    s1: "noinherit #387050" # LiteralStringSingle
    s2: "noinherit #387050" # LiteralStringDouble
