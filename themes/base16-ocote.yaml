    cm: "noinherit italic #6b6253" # CommentMultiline
    cx: "noinherit italic #6b6253" # CommentSpecial
    ch: "noinherit italic #6b6253" # CommentHashbang
    cp: "noinherit italic #6b6253" # CommentPreproc
