# vim: ft=yaml
# Scheme System: base16
# Scheme Name: Papel
# Scheme Author: Teshre
# Template Author: tinted-jqp (https://github.com/tinted-theming/tinted-jqp)
theme:
  name: "native"
  styleOverrides:
    primary: "#2a8a7a"
    secondary: "# 2c6ca0"
    error: "#c0392b"
    inactive: "#6a5d4b"
    success: "#5e7a28"
  chromaStyleOverrides:
    bg: "noinherit #3a2e20 bg:#f5efe2"
    "": "noinherit #3a2e20"
    kc: "noinherit #9b4d8e" # Keyword.Constant
    kr: "noinherit #9b4d8e" # KeywordReserved
    kd: "noinherit #c0392b" # KeywordDeclaration
    kn: "noinherit #2a8a7a" # KeywordNamespace
    kt: "noinherit #c0392b" # KeywordType
    n: "noinherit #3a2e20" # Name
    nc: "noinherit #a8761a" # NameClass
    no: "noinherit #a8761a" # NameConstant
    ne: "noinherit #c25c1f" # NameException
    nf: "noinherit #6e6353" # NameFunction
    nl: "noinherit #2a8a7a" # NameLabel
    nn: "noinherit #c25c1f" # NameNamespace
    py: "noinherit #c25c1f" # NameProperty
    nt: "noinherit #c0392b" # NameTag
    nv: "noinherit #958b7c" # NameVariable
    vc: "noinherit #958b7c" # NameVariableClass
    vg: "noinherit #958b7c" # NameVariableGlobal
    vi: "noinherit #958b7c" # NameVariableInstance
    na: "noinherit #6e6353" # NameAttribute
    nb: "noinherit #2a8a7a" # NameBuiltin
    nx: "noinherit #3a2e20" # NameOther
    l: "noinherit #3a2e20" # Literal
    s: "noinherit #5e7a28" # LiteralString
    sc: "noinherit #5e7a28" # LiteralStringChar
    s1: "noinherit #5e7a28" # LiteralStringSingle
    s2: "noinherit #5e7a28" # LiteralStringDouble
    sb: "noinherit #5e7a28" # LiteralStringBacktick
    sx: "noinherit #5e7a28" # LiteralStringOther
    si: "noinherit #5e7a28" # LiteralStringInterpol
    sr: "noinherit #2a8a7a" # LiteralStringRegex
    sd: "noinherit #9a8c76" # LiteralStringDoc
    sh: "noinherit #9a8c76" # LiteralStringHeredoc
    m: "noinherit #c25c1f" # LiteralNumber
    mb: "noinherit #c25c1f" # LiteralNumberBin
    mh: "noinherit #c25c1f" # LiteralNumberHex
    mi: "noinherit #c25c1f" # LiteralNumberInteger
    mf: "noinherit #c25c1f" # LiteralNumberFloat
    mo: "noinherit #c25c1f" # LiteralNumberOct
    o: "noinherit bold #2a8a7a" # Operator
    ow: "noinherit bold #2a8a7a" # OperatorWord
    c: "noinherit italic #9a8c76" # Comment
    cs: "noinherit italic #9a8c76" # CommentSingle
    cm: "noinherit italic #9a8c76" # CommentMultiline
    cx: "noinherit italic #9a8c76" # CommentSpecial
    ch: "noinherit italic #9a8c76" # CommentHashbang
    cp: "noinherit italic #9a8c76" # CommentPreproc
