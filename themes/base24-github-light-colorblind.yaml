# vim: ft=yaml
# Scheme System: base24
# Scheme Name: Github Light Colorblind
# Scheme Author: Tinted Theming (https://github.com/tinted-theming)
# Template Author: tinted-jqp (https://github.com/tinted-theming/tinted-jqp)
theme:
  name: "native"
  styleOverrides:
    primary: "#0550ae"
    secondary: "# 8250df"
    error: "#8a4600"
    inactive: "#6e7781"
    success: "#0a3069"
  chromaStyleOverrides:
    bg: "noinherit #424a53 bg:#ffffff"
    "": "noinherit #424a53"
    kc: "noinherit #b35900" # Keyword.Constant
    kr: "noinherit #b35900" # KeywordReserved
    kd: "noinherit #f79939" # KeywordDeclaration
    kn: "noinherit #0550ae" # KeywordNamespace
    kt: "noinherit #f79939" # KeywordType
    n: "noinherit #424a53" # Name
    nc: "noinherit #bf8700" # NameClass
    no: "noinherit #bf8700" # NameConstant
    ne: "noinherit #0550ae" # NameException
    nf: "noinherit #6f3800" # NameFunction
    nl: "noinherit #49bcb7" # NameLabel
    nn: "noinherit #0550ae" # NameNamespace
    py: "noinherit #0550ae" # NameProperty
    nt: "noinherit #8a4600" # NameTag
    nv: "noinherit #32383f" # NameVariable
    vc: "noinherit #32383f" # NameVariableClass
    vg: "noinherit #32383f" # NameVariableGlobal
    vi: "noinherit #32383f" # NameVariableInstance
    na: "noinherit #6f3800" # NameAttribute
    nb: "noinherit #49bcb7" # NameBuiltin
    nx: "noinherit #424a53" # NameOther
    l: "noinherit #424a53" # Literal
    s: "noinherit #0a3069" # LiteralString
    sc: "noinherit #0a3069" # LiteralStringChar
    s1: "noinherit #0a3069" # LiteralStringSingle
    s2: "noinherit #0a3069" # LiteralStringDouble
    sb: "noinherit #0a3069" # LiteralStringBacktick
    sx: "noinherit #0a3069" # LiteralStringOther
    si: "noinherit #0a3069" # LiteralStringInterpol
    sr: "noinherit #0550ae" # LiteralStringRegex
    sd: "noinherit #8c959f" # LiteralStringDoc
    sh: "noinherit #8c959f" # LiteralStringHeredoc
    m: "noinherit #0550ae" # LiteralNumber
    mb: "noinherit #0550ae" # LiteralNumberBin
    mh: "noinherit #0550ae" # LiteralNumberHex
    mi: "noinherit #0550ae" # LiteralNumberInteger
    mf: "noinherit #0550ae" # LiteralNumberFloat
    mo: "noinherit #0550ae" # LiteralNumberOct
    o: "noinherit bold #49bcb7" # Operator
    ow: "noinherit bold #49bcb7" # OperatorWord
    c: "noinherit italic #8c959f" # Comment
    cs: "noinherit italic #8c959f" # CommentSingle
    cm: "noinherit italic #8c959f" # CommentMultiline
    cx: "noinherit italic #8c959f" # CommentSpecial
    ch: "noinherit italic #8c959f" # CommentHashbang
    cp: "noinherit italic #8c959f" # CommentPreproc
